<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICSE Class IX — Computer Applications</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060b14;
    --surface: #0d1625;
    --surface2: #111d30;
    --border: #1e3050;
    --accent: #00e5ff;
    --accent2: #7c3aed;
    --accent3: #10b981;
    --accent4: #f59e0b;
    --danger: #ef4444;
    --text: #e2eaf8;
    --muted: #5a7299;
    --glow: 0 0 20px rgba(0,229,255,0.3);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body {
    font-family:'Outfit',sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height:100vh;
    overflow-x:hidden;
  }

  /* PARTICLES BG */
  #particles { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; overflow:hidden; }
  .star { position:absolute; border-radius:50%; background:#00e5ff; animation:twinkle var(--dur,3s) ease-in-out infinite; opacity:0; }
  @keyframes twinkle { 0%,100%{opacity:0;transform:scale(1)} 50%{opacity:var(--op,.5);transform:scale(1.2)} }

  /* HEADER */
  header {
    position:sticky; top:0; z-index:100;
    background: rgba(6,11,20,0.9);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 1.5rem;
  }
  .header-top {
    display:flex; align-items:center; gap:1rem;
    padding: 0.8rem 0;
    border-bottom: 1px solid rgba(30,48,80,0.5);
  }
  .logo-badge {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    padding: 0.35rem 0.8rem;
    border-radius: 6px;
    font-family:'Space Mono',monospace;
    font-weight:700;
    font-size:0.75rem;
    letter-spacing:2px;
    color:#fff;
    white-space:nowrap;
  }
  .header-title {
    font-size:1.1rem;
    font-weight:700;
    letter-spacing:0.5px;
  }
  .header-title span { color: var(--accent); }

  /* OVERALL PROGRESS */
  .overall-progress {
    margin-left:auto;
    display:flex; align-items:center; gap:0.6rem;
    font-size:0.8rem;
    color: var(--muted);
  }
  .prog-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius:20px;
    width:120px; height:8px;
    overflow:hidden;
  }
  .prog-fill {
    height:100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    transition: width 0.5s ease;
    border-radius:20px;
  }

  /* NAV CHAPTERS */
  .chapter-nav {
    display:flex;
    overflow-x:auto;
    gap:0;
    scrollbar-width:none;
    padding: 0;
  }
  .chapter-nav::-webkit-scrollbar { display:none; }
  .ch-btn {
    flex-shrink:0;
    background:none; border:none;
    color: var(--muted);
    font-family:'Outfit',sans-serif;
    font-size:0.75rem;
    font-weight:500;
    padding: 0.7rem 1rem;
    cursor:pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    display:flex; align-items:center; gap:0.4rem;
    white-space:nowrap;
  }
  .ch-btn:hover { color: var(--text); }
  .ch-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .ch-btn .ch-num {
    background: var(--surface2);
    border-radius:4px;
    padding: 0.1rem 0.35rem;
    font-family:'Space Mono',monospace;
    font-size:0.65rem;
  }
  .ch-btn.done .ch-num { background: var(--accent3); color:#000; }

  /* MAIN */
  main { position:relative; z-index:1; max-width:1000px; margin:0 auto; padding:2rem 1.5rem; }

  /* CHAPTER VIEW */
  .chapter-view { display:none; }
  .chapter-view.active { display:block; animation: slideIn 0.4s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

  /* CHAPTER HEADER */
  .ch-header {
    margin-bottom:2rem;
    position:relative;
  }
  .ch-label {
    font-family:'Space Mono',monospace;
    font-size:0.7rem;
    color: var(--accent);
    letter-spacing:3px;
    text-transform:uppercase;
    margin-bottom:0.5rem;
  }
  .ch-title {
    font-size:clamp(1.6rem,4vw,2.5rem);
    font-weight:900;
    line-height:1.1;
    margin-bottom:1rem;
  }
  .ch-title .highlight { color: var(--accent); }

  /* CHAPTER PROGRESS BAR */
  .ch-progress-bar {
    background: var(--surface2);
    border-radius:4px;
    height:6px;
    margin-bottom:0.5rem;
    overflow:hidden;
  }
  .ch-progress-fill {
    height:100%;
    background: linear-gradient(90deg,var(--accent2),var(--accent));
    transition:width 0.6s ease;
    border-radius:4px;
  }
  .ch-progress-label { font-size:0.75rem; color:var(--muted); display:flex; justify-content:space-between; }

  /* SECTION CARDS */
  .section-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius:14px;
    padding:1.5rem;
    margin-bottom:1.2rem;
    position:relative;
    overflow:hidden;
    transition: border-color 0.3s;
  }
  .section-card::before {
    content:'';
    position:absolute; left:0; top:0; bottom:0;
    width:3px;
    background: linear-gradient(180deg,var(--accent2),var(--accent));
    border-radius:3px 0 0 3px;
  }
  .section-card:hover { border-color: var(--accent2); }
  .section-title {
    font-size:1rem;
    font-weight:700;
    margin-bottom:0.8rem;
    display:flex; align-items:center; gap:0.5rem;
  }
  .section-icon { font-size:1.2rem; }
  .section-body {
    font-size:0.9rem;
    color: #a8c0e8;
    line-height:1.7;
  }
  .section-body p { margin-bottom:0.6rem; }
  .section-body ul { padding-left:1.2rem; }
  .section-body li { margin-bottom:0.3rem; }
  .section-body strong { color: var(--accent); }

  /* CODE BLOCK */
  .code-block {
    background: #020810;
    border: 1px solid var(--border);
    border-radius:10px;
    padding:1.2rem;
    margin:1rem 0;
    font-family:'Space Mono',monospace;
    font-size:0.78rem;
    line-height:1.8;
    overflow-x:auto;
    position:relative;
  }
  .code-block .kw { color:#c678dd; }
  .code-block .cls { color:#e5c07b; }
  .code-block .fn { color:#61afef; }
  .code-block .str { color:#98c379; }
  .code-block .cmt { color:#5c6370; font-style:italic; }
  .code-block .num { color:#d19a66; }
  .code-tag {
    position:absolute; top:0.5rem; right:0.7rem;
    font-size:0.6rem; color: var(--muted);
    font-family:'Space Mono',monospace;
    letter-spacing:1px;
  }

  /* INFO BOX */
  .info-box {
    background: rgba(0,229,255,0.06);
    border: 1px solid rgba(0,229,255,0.2);
    border-radius:10px;
    padding:1rem 1.2rem;
    margin:1rem 0;
    font-size:0.85rem;
    display:flex; gap:0.7rem; align-items:flex-start;
  }
  .info-box .icon { font-size:1.1rem; flex-shrink:0; margin-top:0.1rem; }
  .tip-box {
    background: rgba(16,185,129,0.06);
    border: 1px solid rgba(16,185,129,0.25);
    border-radius:10px;
    padding:1rem 1.2rem;
    margin:1rem 0;
    font-size:0.85rem;
    display:flex; gap:0.7rem; align-items:flex-start;
  }
  .warn-box {
    background: rgba(245,158,11,0.07);
    border: 1px solid rgba(245,158,11,0.25);
    border-radius:10px;
    padding:1rem 1.2rem;
    margin:1rem 0;
    font-size:0.85rem;
    display:flex; gap:0.7rem; align-items:flex-start;
  }

  /* TABLE */
  .styled-table { width:100%; border-collapse:collapse; margin:1rem 0; font-size:0.83rem; }
  .styled-table th {
    background: var(--surface2);
    color: var(--accent);
    padding:0.6rem 0.8rem;
    text-align:left;
    font-family:'Space Mono',monospace;
    font-size:0.7rem;
    letter-spacing:1px;
    border: 1px solid var(--border);
  }
  .styled-table td {
    padding:0.55rem 0.8rem;
    border: 1px solid var(--border);
    color: #a8c0e8;
  }
  .styled-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  /* FLASHCARD SECTION */
  .flashcards-section { margin: 2rem 0; }
  .flashcards-title {
    font-size:1.1rem;
    font-weight:800;
    margin-bottom:1rem;
    display:flex; align-items:center; gap:0.5rem;
  }
  .fc-wrapper { position:relative; min-height:200px; }
  .fc-counter {
    font-family:'Space Mono',monospace;
    font-size:0.75rem;
    color:var(--muted);
    margin-bottom:0.7rem;
    text-align:right;
  }
  .flashcard {
    width:100%;
    min-height:160px;
    cursor:pointer;
    perspective:1000px;
  }
  .fc-inner {
    position:relative;
    width:100%;
    min-height:160px;
    transform-style:preserve-3d;
    transition:transform 0.55s cubic-bezier(0.4,0,0.2,1);
  }
  .flashcard.flipped .fc-inner { transform:rotateY(180deg); }
  .fc-front, .fc-back {
    position:absolute; inset:0;
    backface-visibility:hidden;
    border-radius:14px;
    padding:1.5rem;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
  }
  .fc-front {
    background: linear-gradient(135deg, var(--surface2), #0d1e3a);
    border: 1px solid var(--border);
  }
  .fc-back {
    background: linear-gradient(135deg, #0a1f1a, #071228);
    border: 1px solid rgba(16,185,129,0.3);
    transform:rotateY(180deg);
  }
  .fc-q-label { font-size:0.65rem; color:var(--muted); letter-spacing:2px; margin-bottom:0.6rem; font-family:'Space Mono',monospace; }
  .fc-question { font-size:1rem; font-weight:600; line-height:1.5; }
  .fc-answer { font-size:0.9rem; color:#a8c0e8; line-height:1.6; }
  .fc-a-label { font-size:0.65rem; color:var(--accent3); letter-spacing:2px; margin-bottom:0.6rem; font-family:'Space Mono',monospace; }
  .fc-hint { font-size:0.7rem; color:var(--muted); margin-top:0.8rem; }
  .fc-controls { display:flex; gap:0.7rem; margin-top:0.8rem; justify-content:center; }
  .fc-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family:'Outfit',sans-serif;
    font-size:0.8rem;
    padding:0.5rem 1.2rem;
    border-radius:8px;
    cursor:pointer;
    transition:all 0.2s;
  }
  .fc-btn:hover { background:var(--border); }
  .fc-btn.primary { background: linear-gradient(135deg,var(--accent2),var(--accent)); border:none; color:#fff; font-weight:600; }
  .fc-btn:disabled { opacity:0.3; cursor:not-allowed; }

  /* QUIZ */
  .quiz-section { margin-top:2.5rem; }
  .quiz-header {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:1.2rem;
  }
  .quiz-title { font-size:1.1rem; font-weight:800; display:flex; align-items:center; gap:0.5rem; }
  .quiz-score-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius:20px;
    padding:0.3rem 0.8rem;
    font-family:'Space Mono',monospace;
    font-size:0.75rem;
    color: var(--accent);
  }
  .quiz-q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius:14px;
    padding:1.5rem;
    margin-bottom:1rem;
  }
  .q-number {
    font-family:'Space Mono',monospace;
    font-size:0.65rem;
    color:var(--muted);
    letter-spacing:2px;
    margin-bottom:0.6rem;
  }
  .q-text { font-size:0.95rem; font-weight:600; margin-bottom:1rem; line-height:1.5; }
  .q-options { display:flex; flex-direction:column; gap:0.5rem; }
  .q-opt {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius:10px;
    padding:0.7rem 1rem;
    cursor:pointer;
    font-size:0.87rem;
    transition:all 0.25s;
    display:flex; align-items:center; gap:0.6rem;
    color: var(--text);
    text-align:left;
  }
  .q-opt:hover:not(.disabled) { border-color:var(--accent2); background:rgba(124,58,237,0.1); }
  .q-opt.correct { border-color:var(--accent3); background:rgba(16,185,129,0.15); color:#6ee7b7; }
  .q-opt.wrong { border-color:var(--danger); background:rgba(239,68,68,0.1); color:#fca5a5; }
  .q-opt.disabled { cursor:default; }
  .opt-circle {
    width:22px; height:22px; border-radius:50%;
    background: var(--border);
    display:flex; align-items:center; justify-content:center;
    font-size:0.65rem;
    font-family:'Space Mono',monospace;
    flex-shrink:0;
    font-weight:700;
  }
  .q-opt.correct .opt-circle { background:var(--accent3); color:#000; }
  .q-opt.wrong .opt-circle { background:var(--danger); color:#fff; }
  .q-explanation {
    margin-top:0.7rem;
    padding:0.8rem 1rem;
    background: rgba(0,229,255,0.05);
    border: 1px solid rgba(0,229,255,0.15);
    border-radius:8px;
    font-size:0.82rem;
    color:#a8c0e8;
    display:none;
  }
  .q-explanation.show { display:block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .quiz-next-btn {
    background: linear-gradient(135deg,var(--accent2),var(--accent));
    border:none; color:#fff;
    font-family:'Outfit',sans-serif;
    font-weight:700; font-size:0.9rem;
    padding:0.75rem 2rem;
    border-radius:10px;
    cursor:pointer;
    margin-top:0.5rem;
    transition:transform 0.2s, box-shadow 0.2s;
  }
  .quiz-next-btn:hover { transform:translateY(-2px); box-shadow:var(--glow); }
  .quiz-result {
    display:none;
    text-align:center;
    padding:2.5rem 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius:14px;
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn { from{opacity:0;transform:scale(0.7)} to{opacity:1;transform:scale(1)} }
  .result-score {
    font-size:4rem;
    font-weight:900;
    line-height:1;
    margin:0.5rem 0;
  }
  .result-score.great { color:var(--accent3); text-shadow:0 0 30px rgba(16,185,129,0.5); }
  .result-score.ok { color:var(--accent4); text-shadow:0 0 30px rgba(245,158,11,0.5); }
  .result-score.low { color:var(--danger); text-shadow:0 0 30px rgba(239,68,68,0.5); }
  .result-emoji { font-size:2.5rem; margin-bottom:0.5rem; }
  .result-msg { font-size:1rem; color:var(--muted); margin-bottom:1.5rem; }
  .retry-btn {
    background:transparent;
    border: 1px solid var(--border);
    color:var(--text);
    font-family:'Outfit',sans-serif;
    font-size:0.85rem;
    padding:0.6rem 1.5rem;
    border-radius:8px;
    cursor:pointer;
    transition:all 0.2s;
  }
  .retry-btn:hover { border-color:var(--accent2); color:var(--accent); }

  /* NEXT CHAPTER BTN */
  .next-ch-btn {
    display:inline-flex;
    align-items:center; gap:0.5rem;
    background: linear-gradient(135deg,var(--accent2),var(--accent));
    border:none; color:#fff;
    font-family:'Outfit',sans-serif;
    font-weight:700; font-size:0.9rem;
    padding:0.8rem 2rem;
    border-radius:12px;
    cursor:pointer;
    margin-top:1.5rem;
    transition:all 0.3s;
  }
  .next-ch-btn:hover { transform:translateY(-3px); box-shadow:0 8px 25px rgba(0,229,255,0.2); }

  /* CONFETTI OVERLAY */
  #confetti-overlay { position:fixed; inset:0; pointer-events:none; z-index:9999; overflow:hidden; }
  .confetti-piece {
    position:absolute;
    width:10px; height:10px;
    animation:confettiFall 1.2s ease-out forwards;
  }
  @keyframes confettiFall {
    0% { transform:translateY(-20px) rotate(0deg); opacity:1; }
    100% { transform:translateY(80vh) rotate(720deg); opacity:0; }
  }

  /* CORRECT PULSE */
  .correct-pulse {
    animation:correctPulse 0.5s ease;
  }
  @keyframes correctPulse {
    0%{transform:scale(1)} 50%{transform:scale(1.03)} 100%{transform:scale(1)}
  }

  /* SIDEBAR-LIKE CHAPTER OVERVIEW */
  .ch-overview {
    display:flex;
    gap:0.4rem;
    flex-wrap:wrap;
    margin-bottom:1.5rem;
  }
  .topic-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius:20px;
    padding:0.25rem 0.7rem;
    font-size:0.72rem;
    color:var(--muted);
  }

  /* TOGGLE SECTIONS */
  .toggle-section {
    border: 1px solid var(--border);
    border-radius:12px;
    margin-bottom:0.8rem;
    overflow:hidden;
  }
  .toggle-header {
    padding:1rem 1.2rem;
    cursor:pointer;
    display:flex; justify-content:space-between; align-items:center;
    background: var(--surface);
    font-weight:600; font-size:0.9rem;
    transition:background 0.2s;
    user-select:none;
  }
  .toggle-header:hover { background: var(--surface2); }
  .toggle-arrow { transition:transform 0.3s; font-size:0.8rem; color:var(--muted); }
  .toggle-section.open .toggle-arrow { transform:rotate(180deg); }
  .toggle-body {
    max-height:0; overflow:hidden;
    transition:max-height 0.4s ease;
    background: var(--surface2);
    padding:0 1.2rem;
    font-size:0.88rem; color:#a8c0e8; line-height:1.7;
  }
  .toggle-section.open .toggle-body { max-height:600px; padding:1rem 1.2rem; }

  /* WELCOME SCREEN */
  #welcome {
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    padding:3rem 1rem;
  }
  .welcome-badge {
    background: linear-gradient(135deg,var(--accent2),var(--accent));
    color:#fff;
    font-size:0.7rem;
    letter-spacing:3px;
    padding:0.35rem 1rem;
    border-radius:20px;
    font-family:'Space Mono',monospace;
    margin-bottom:1.5rem;
  }
  .welcome-title {
    font-size:clamp(2rem,6vw,3.5rem);
    font-weight:900;
    line-height:1.1;
    margin-bottom:1rem;
  }
  .welcome-title .line2 { color:var(--accent); }
  .welcome-sub { font-size:1rem; color:var(--muted); max-width:500px; margin-bottom:2rem; line-height:1.6; }
  .welcome-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
    gap:0.7rem;
    width:100%;
    max-width:700px;
    margin-bottom:2rem;
  }
  .wg-card {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:12px;
    padding:1rem 0.7rem;
    cursor:pointer;
    transition:all 0.25s;
    text-align:center;
  }
  .wg-card:hover { border-color:var(--accent2); transform:translateY(-3px); box-shadow:0 8px 20px rgba(124,58,237,0.2); }
  .wg-num { font-family:'Space Mono',monospace; font-size:0.65rem; color:var(--muted); margin-bottom:0.4rem; }
  .wg-label { font-size:0.78rem; font-weight:600; line-height:1.3; }
  .start-btn {
    background:linear-gradient(135deg,var(--accent2),var(--accent));
    border:none; color:#fff;
    font-family:'Outfit',sans-serif;
    font-weight:800; font-size:1rem;
    padding:0.9rem 2.5rem;
    border-radius:12px;
    cursor:pointer;
    transition:all 0.3s;
    letter-spacing:0.5px;
  }
  .start-btn:hover { transform:translateY(-3px); box-shadow:0 10px 30px rgba(0,229,255,0.25); }

  /* QUIZ PROGRESS DOTS */
  .q-dots { display:flex; gap:0.35rem; margin-bottom:1rem; }
  .q-dot { width:8px; height:8px; border-radius:50%; background:var(--border); transition:all 0.3s; }
  .q-dot.answered { background:var(--accent2); }
  .q-dot.correct-dot { background:var(--accent3); }
  .q-dot.wrong-dot { background:var(--danger); }

  /* RESPONSIVE */
  @media(max-width:600px) {
    main { padding:1.5rem 1rem; }
    .section-card { padding:1.1rem; }
    .flashcard { min-height:140px; }
    .fc-inner { min-height:140px; }
    .fc-front, .fc-back { min-height:140px; }
  }

  /* ACCENT TAG */
  .tag {
    display:inline-block;
    background:rgba(0,229,255,0.1);
    border:1px solid rgba(0,229,255,0.2);
    color:var(--accent);
    border-radius:4px;
    padding:0.1rem 0.4rem;
    font-size:0.75rem;
    font-family:'Space Mono',monospace;
  }

//  STATE
// ═══════════════════════════════════════════════
const state = {
  completedChapters: new Set(),
  quizScores: {},
  currentFC: new Array(chapters.length).fill(0),
  fcFlipped: new Array(chapters.length).fill(false),
  quizState: chapters.map(() => ({ current:0, score:0, answers:[], done:false }))
};

// ═══════════════════════════════════════════════
//  BUILD WELCOME GRID
// ═══════════════════════════════════════════════
function buildWelcomeGrid() {
  const grid = document.getElementById('welcome-grid');
  chapters.forEach((ch, i) => {
    const card = document.createElement('div');
    card.className = 'wg-card';
    card.innerHTML = `<div class="wg-num">Chapter ${String(i+1).padStart(2,'0')}</div><div style="font-size:1.4rem;margin-bottom:0.4rem">${ch.icon}</div><div class="wg-label">${ch.title}</div>`;
    card.onclick = () => showChapter(i);
    grid.appendChild(card);
  });
}

// ═══════════════════════════════════════════════
//  BUILD CHAPTERS
// ═══════════════════════════════════════════════
function buildChapters() {
  const main = document.querySelector('main');
  chapters.forEach((ch, ci) => {
    const div = document.createElement('div');
    div.id = `chapter-${ci}`;
    div.className = 'chapter-view';

    const topicChips = ch.topics.map(t => `<span class="topic-chip">${t}</span>`).join('');

    div.innerHTML = `
      <div class="ch-header">
        <div class="ch-label">Chapter ${String(ci+1).padStart(2,'0')} / 11</div>
        <h1 class="ch-title">${ch.icon} <span class="highlight">${ch.title}</span></h1>
        <p style="color:var(--muted);font-size:0.9rem;margin-bottom:1rem">${ch.subtitle}</p>
        <div class="ch-overview">${topicChips}</div>
        <div class="ch-progress-bar"><div class="ch-progress-fill" id="cpf-${ci}" style="width:0%"></div></div>
        <div class="ch-progress-label"><span>Progress</span><span id="cpl-${ci}">0%</span></div>
      </div>

      ${ch.content}

      <div class="flashcards-section">
        <div class="flashcards-title">🃏 Flashcards <span style="color:var(--muted);font-weight:400;font-size:0.85rem">&nbsp;— click card to flip</span></div>
        <div class="fc-counter" id="fc-counter-${ci}">Card 1 of ${ch.flashcards.length}</div>
        <div class="fc-wrapper">
          <div class="flashcard" id="fc-${ci}" onclick="flipCard(${ci})">
            <div class="fc-inner">
              <div class="fc-front">
                <div class="fc-q-label">QUESTION</div>
                <div class="fc-question" id="fc-q-${ci}">${ch.flashcards[0].q}</div>
                <div class="fc-hint">👆 Click to reveal answer</div>
              </div>
              <div class="fc-back">
                <div class="fc-a-label">ANSWER</div>
                <div class="fc-answer" id="fc-a-${ci}">${ch.flashcards[0].a}</div>
              </div>
            </div>
          </div>
        </div>
        <div class="fc-controls">
          <button class="fc-btn" id="fc-prev-${ci}" onclick="fcNav(${ci},-1)" disabled>← Prev</button>
          <button class="fc-btn primary" onclick="flipCard(${ci})">Flip</button>
          <button class="fc-btn" id="fc-next-${ci}" onclick="fcNav(${ci},1)">Next →</button>
        </div>
      </div>

      <div class="quiz-section" id="quiz-${ci}">
        <div class="quiz-header">
          <div class="quiz-title">🧠 Chapter Quiz</div>
          <div class="quiz-score-badge" id="qsb-${ci}">0 / ${ch.quiz.length}</div>
        </div>
        <div class="q-dots" id="qdots-${ci}">
          ${ch.quiz.map((_,qi) => `<div class="q-dot" id="qdot-${ci}-${qi}"></div>`).join('')}
        </div>
        <div id="quiz-body-${ci}"></div>
      </div>

      <div style="text-align:center">
        ${ci < chapters.length-1 ? `<button class="next-ch-btn" onclick="showChapter(${ci+1})">Next Chapter: ${chapters[ci+1].icon} ${chapters[ci+1].title} →</button>` : `<div style="padding:2rem;color:var(--accent3);font-weight:700;font-size:1.1rem">🎉 You've completed all 11 chapters!</div>`}
      </div>
    `;
    main.appendChild(div);

    // Build first quiz question
    renderQuestion(ci, 0);
  });
}

// ═══════════════════════════════════════════════
//  RENDER QUIZ QUESTION
// ═══════════════════════════════════════════════
function renderQuestion(ci, qi) {
  const body = document.getElementById(`quiz-body-${ci}`);
  const ch = chapters[ci];
  const q = ch.quiz[qi];
  const qs = state.quizState[ci];

  if (qs.done) { showResult(ci); return; }

  const optLabels = ['A','B','C','D'];
  const optsHTML = q.opts.map((o, oi) => `
    <div class="q-opt" id="opt-${ci}-${qi}-${oi}" onclick="answerQ(${ci},${qi},${oi})">
      <div class="opt-circle">${optLabels[oi]}</div> ${o}
    </div>
  `).join('');

  body.innerHTML = `
    <div class="quiz-q-card" id="qqc-${ci}-${qi}">
      <div class="q-number">QUESTION ${qi+1} OF ${ch.quiz.length}</div>
      <div class="q-text">${q.q}</div>
      <div class="q-options">${optsHTML}</div>
      <div class="q-explanation" id="qexp-${ci}-${qi}">${q.exp}</div>
    </div>
    <button class="quiz-next-btn" id="qnext-${ci}" onclick="nextQ(${ci},${qi})" style="display:none">
      ${qi < ch.quiz.length - 1 ? 'Next Question →' : 'See Results 🎯'}
    </button>
  `;
}

function answerQ(ci, qi, chosen) {
  const ch = chapters[ci];
  const q = ch.quiz[qi];
  const qs = state.quizState[ci];
  if (qs.answers[qi] !== undefined) return;

  qs.answers[qi] = chosen;
  const correct = chosen === q.ans;
  if (correct) qs.score++;

  // Update dots
  const dot = document.getElementById(`qdot-${ci}-${qi}`);
  dot.classList.add('answered', correct ? 'correct-dot' : 'wrong-dot');

  // Style options
  for(let i=0;i<q.opts.length;i++){
    const opt = document.getElementById(`opt-${ci}-${qi}-${i}`);
    opt.classList.add('disabled');
    if(i === q.ans) opt.classList.add('correct');
    else if(i === chosen && !correct) opt.classList.add('wrong');
  }

  // Show explanation
  document.getElementById(`qexp-${ci}-${qi}`).classList.add('show');
  document.getElementById(`qnext-${ci}`).style.display = 'block';

  // Update score badge
  document.getElementById(`qsb-${ci}`).textContent = `${qs.score} / ${ch.quiz.length}`;

  // Confetti on correct
  if(correct) {
    const qCard = document.getElementById(`qqc-${ci}-${qi}`);
    qCard.classList.add('correct-pulse');
    launchConfetti(5);
  }

  // Update progress
  updateProgress(ci);
}

function nextQ(ci, qi) {
  const ch = chapters[ci];
  const qs = state.quizState[ci];
  if(qi >= ch.quiz.length - 1) {
    qs.done = true;
    showResult(ci);
    // Mark chapter done if score decent
    if(qs.score >= Math.ceil(ch.quiz.length * 0.6)) {
      state.completedChapters.add(ci);
      document.getElementById(`nav-${ci}`).classList.add('done');
    }
    updateOverallProgress();
  } else {
    renderQuestion(ci, qi+1);
    state.quizState[ci].current = qi+1;
  }
}

function showResult(ci) {
  const ch = chapters[ci];
  const qs = state.quizState[ci];
  const pct = Math.round((qs.score / ch.quiz.length) * 100);
  const body = document.getElementById(`quiz-body-${ci}`);

  let cls = pct>=80?'great':pct>=50?'ok':'low';
  let emoji = pct>=80?'🎉':pct>=50?'👍':'😅';
  let msg = pct>=80?'Excellent! You mastered this chapter!':pct>=50?'Good effort! Review and try again.':'Keep studying — you can do it!';

  body.innerHTML = `
    <div class="quiz-result" style="display:block">
      <div class="result-emoji">${emoji}</div>
      <div style="font-size:0.85rem;color:var(--muted);margin-bottom:0.3rem">Your Score</div>
      <div class="result-score ${cls}">${qs.score}/${ch.quiz.length}</div>
      <div style="font-size:1.5rem;font-weight:700;color:var(--muted);margin-bottom:0.5rem">${pct}%</div>
      <div class="result-msg">${msg}</div>
      <button class="retry-btn" onclick="retryQuiz(${ci})">↩ Retry Quiz</button>
    </div>
  `;

  if(pct === 100) launchConfetti(30);
  if(typeof window.trackQuizScore === 'function') {
    window.trackQuizScore(ci, qs.score, ch.quiz.length);
  }
}

function retryQuiz(ci) {
  state.quizState[ci] = { current:0, score:0, answers:[], done:false };
  document.getElementById(`qsb-${ci}`).textContent = `0 / ${chapters[ci].quiz.length}`;
  // Reset dots
  chapters[ci].quiz.forEach((_,qi) => {
    const dot = document.getElementById(`qdot-${ci}-${qi}`);
    dot.className = 'q-dot';
  });
  renderQuestion(ci, 0);
  updateProgress(ci);
}

// ═══════════════════════════════════════════════
//  FLASHCARD NAVIGATION
// ═══════════════════════════════════════════════
function flipCard(ci) {
  const fc = document.getElementById(`fc-${ci}`);
  fc.classList.toggle('flipped');
  state.fcFlipped[ci] = fc.classList.contains('flipped');
}

function fcNav(ci, dir) {
  const ch = chapters[ci];
  const fc = document.getElementById(`fc-${ci}`);
  fc.classList.remove('flipped');
  state.fcFlipped[ci] = false;

  state.currentFC[ci] = Math.max(0, Math.min(ch.flashcards.length-1, state.currentFC[ci]+dir));
  const idx = state.currentFC[ci];

  document.getElementById(`fc-q-${ci}`).textContent = ch.flashcards[idx].q;
  document.getElementById(`fc-a-${ci}`).textContent = ch.flashcards[idx].a;
  document.getElementById(`fc-counter-${ci}`).textContent = `Card ${idx+1} of ${ch.flashcards.length}`;
  document.getElementById(`fc-prev-${ci}`).disabled = idx===0;
  document.getElementById(`fc-next-${ci}`).disabled = idx===ch.flashcards.length-1;
}

// ═══════════════════════════════════════════════
//  PROGRESS
// ═══════════════════════════════════════════════
function updateProgress(ci) {
  const ch = chapters[ci];
  const qs = state.quizState[ci];
  const answered = qs.answers.filter(a => a !== undefined).length;
  const total = ch.quiz.length + ch.flashcards.length;
  const fcVisited = state.currentFC[ci] + 1;
  const pct = Math.min(100, Math.round(((answered + fcVisited) / total) * 100));
  document.getElementById(`cpf-${ci}`).style.width = pct + '%';
  document.getElementById(`cpl-${ci}`).textContent = pct + '%';
}

function updateOverallProgress() {
  const done = state.completedChapters.size;
  const pct = Math.round((done / chapters.length) * 100);
  document.getElementById('overall-fill').style.width = pct + '%';
  document.getElementById('overall-label').textContent = `${done} / ${chapters.length}`;
}

// ═══════════════════════════════════════════════
//  SHOW CHAPTER
// ═══════════════════════════════════════════════
function showChapter(id) {
  document.querySelectorAll('.chapter-view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.ch-btn').forEach(b => b.classList.remove('active'));

  if(id === 'welcome') {
    document.getElementById('chapter-welcome').classList.add('active');
    document.getElementById('nav-welcome').classList.add('active');
  } else {
    document.getElementById(`chapter-${id}`).classList.add('active');
    document.getElementById(`nav-${id}`).classList.add('active');
    window.scrollTo({top:0,behavior:'smooth'});
    if(typeof window.trackChapterVisit === 'function') {
      window.trackChapterVisit(id, chapters[id]?.title);
    }
  }
}

// ═══════════════════════════════════════════════
//  CONFETTI
// ═══════════════════════════════════════════════
function launchConfetti(count) {
  const overlay = document.getElementById('confetti-overlay');
  const colors = ['#00e5ff','#7c3aed','#10b981','#f59e0b','#ef4444','#fff'];
  const shapes = ['★','●','◆','▲','♥'];
  for(let i=0; i<count; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random()*100 + 'vw';
      el.style.top = '-20px';
      el.style.color = colors[Math.floor(Math.random()*colors.length)];
      el.style.fontSize = (10+Math.random()*14) + 'px';
      el.style.animationDuration = (0.8+Math.random()*0.8) + 's';
      el.style.animationDelay = Math.random()*0.3 + 's';
      el.textContent = shapes[Math.floor(Math.random()*shapes.length)];
      overlay.appendChild(el);
      setTimeout(() => el.remove(), 2000);
    }, i * 60);
  }
}

// ═══════════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════════
function createParticles() {
  const container = document.getElementById('particles');
  for(let i=0; i<40; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = 1 + Math.random()*2;
    star.style.cssText = `
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      width:${size}px; height:${size}px;
      --dur:${2+Math.random()*4}s;
      --op:${0.2+Math.random()*0.4};
      animation-delay:${Math.random()*4}s;
    `;
    container.appendChild(star);
  }
}

// ═══════════════════════════════════════════════
//  TOGGLE SECTIONS
// ═══════════════════════════════════════════════
document.addEventListener('click', e => {
  const th = e.target.closest('.toggle-header');
  if(th) th.parentElement.classList.toggle('open');
});

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
createParticles();
buildWelcomeGrid();
buildChapters();
</script>
